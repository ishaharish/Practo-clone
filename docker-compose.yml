version: '3.8'

services:
  practo-db:
    image: mysql:8.0
    container_name: practo-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: practo_db
    ports:
      - "3306:3306"
    networks:
      - practo-net
    volumes:
      - db_data:/var/lib/mysql

  practo-backend:
    build:
      context: ./practo-backend
      dockerfile: Dockerfile
    container_name: practo-backend
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=practo-db;Database=practo_db;User=root;Password=root;
    depends_on:
      - practo-db
    networks:
      - practo-net

  practo-frontend:
    build:
      context: ./practo-frontend
      dockerfile: Dockerfile
    container_name: practo-frontend
    ports:
      - "4200:80"
    depends_on:
      - practo-backend
    networks:
      - practo-net

networks:
  practo-net:
    driver: bridge

volumes:
  db_data:
