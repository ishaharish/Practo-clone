<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-practo-text">
      Login to Practo * * * *
    </h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
      
      <div *ngIf="successMsg" class="mb-4 bg-green-50 text-green-700 p-3 rounded text-sm font-semibold">
        {{successMsg}}
      </div>
      <div *ngIf="error" class="mb-4 bg-red-50 text-red-600 p-3 rounded text-sm">
        {{error}}
      </div>

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div>
          <label class="block text-sm font-medium text-gray-700">Email Address</label>
          <div class="mt-1">
            <input type="email" formControlName="email" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-practo-blue focus:border-practo-blue sm:text-sm">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <div class="mt-1">
            <input type="password" formControlName="password" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-practo-blue focus:border-practo-blue sm:text-sm">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" type="checkbox" class="h-4 w-4 text-practo-blue focus:ring-practo-blue border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-900">
              Remember me
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-practo-blue hover:text-blue-500">
              Forgot password?
            </a>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loginForm.invalid || loading" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-practo-blue hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-practo-blue transition-colors disabled:opacity-50">
            {{ loading ? 'Logging in...' : 'Login' }}
          </button>
        </div>
      </form>
    </div>
    
    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        New to Practo? 
        <a routerLink="/auth/register" class="font-medium text-practo-blue hover:text-blue-500">
          Join now
        </a>
      </p>
    </div>
  </div>
</div>
