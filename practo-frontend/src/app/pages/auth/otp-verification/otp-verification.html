<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-practo-text">
      Verify Account
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      We sent an OTP to {{ email || 'your email' }}
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
      
      <div *ngIf="error" class="mb-4 bg-red-50 text-red-600 p-3 rounded text-sm">
        {{error}}
      </div>

      <form class="space-y-6" (ngSubmit)="onSubmit()">
        <div>
          <label class="block text-sm font-medium text-gray-700 text-center mb-4">Enter 6-digit OTP</label>
          <div class="flex justify-center">
            <!-- Simply use one input for now for the 6 digit code for easier form binding -->
            <input type="text" [(ngModel)]="otpCode" name="otpCode" maxlength="6" class="w-full text-center tracking-[1em] border border-gray-300 rounded focus:outline-none focus:ring-practo-blue focus:border-practo-blue text-xl font-bold py-3">
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loading" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-practo-blue hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-practo-blue transition-colors disabled:opacity-50">
            {{ loading ? 'Verifying...' : 'Verify & Proceed' }}
          </button>
        </div>
        
        <div class="text-center">
          <p class="text-sm text-gray-500">Didn't receive OTP? <a href="#" (click)="onResend($event)" class="text-practo-blue font-semibold">Resend</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
