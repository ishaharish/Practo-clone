<div class="bg-gray-50 min-h-screen py-8">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-sm overflow-hidden flex flex-col md:flex-row min-h-[500px]">
      
      <!-- Left side: Payment Methods -->
      <div class="w-full md:w-1/3 bg-gray-50 border-r border-gray-200">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider p-4 border-b border-gray-200">Payment Options</h2>
        
        <button (click)="paymentMethod = 'card'" class="w-full text-left p-4 flex items-center gap-3 border-b border-gray-200 transition-colors" [ngClass]="paymentMethod === 'card' ? 'bg-white border-l-4 border-l-[#00A5CF]' : 'hover:bg-gray-100'">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
          <span class="font-semibold text-gray-800 text-sm">Credit / Debit Card</span>
        </button>
        
        <button (click)="paymentMethod = 'upi'" class="w-full text-left p-4 flex items-center gap-3 border-b border-gray-200 transition-colors" [ngClass]="paymentMethod === 'upi' ? 'bg-white border-l-4 border-l-[#00A5CF]' : 'hover:bg-gray-100'">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
          <span class="font-semibold text-gray-800 text-sm">UPI</span>
        </button>

        <button (click)="paymentMethod = 'netbanking'" class="w-full text-left p-4 flex items-center gap-3 border-b border-gray-200 transition-colors" [ngClass]="paymentMethod === 'netbanking' ? 'bg-white border-l-4 border-l-[#00A5CF]' : 'hover:bg-gray-100'">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
          <span class="font-semibold text-gray-800 text-sm">Net Banking</span>
        </button>
      </div>

      <!-- Right side: Payment Details -->
      <div class="w-full md:w-2/3 p-8 relative">
        <div *ngIf="loading" class="absolute inset-0 bg-white/80 z-10 flex flex-col items-center justify-center">
          <div class="w-10 h-10 border-4 border-gray-200 border-t-[#00A5CF] rounded-full animate-spin mb-4"></div>
          <p class="font-bold text-gray-600">Processing Payment...</p>
        </div>

        <div class="flex justify-between items-center mb-8 border-b pb-4">
          <h2 class="text-2xl font-bold text-gray-800">Payment Details</h2>
          <div class="text-right">
            <p class="text-sm text-gray-500">Amount to Pay</p>
            <p class="text-2xl font-bold text-[#00A5CF]">₹{{cartService.getCartTotal() + 150}}</p>
          </div>
        </div>

        <div *ngIf="paymentMethod === 'card'" class="max-w-sm">
          <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Card Number</label>
            <input type="text" [(ngModel)]="cardNumber" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#00A5CF]" placeholder="0000 0000 0000 0000">
          </div>
          <div class="flex gap-4 mb-8">
            <div class="flex-1">
              <label class="block text-sm font-semibold text-gray-700 mb-1">Expiry (MM/YY)</label>
              <input type="text" [(ngModel)]="expiry" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#00A5CF]" placeholder="MM/YY">
            </div>
            <div class="flex-1">
              <label class="block text-sm font-semibold text-gray-700 mb-1">CVV</label>
              <input type="password" [(ngModel)]="cvv" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-[#00A5CF]" placeholder="123">
            </div>
          </div>
          <button (click)="processBooking()" class="w-full bg-[#00A5CF] hover:bg-[#008fb5] text-white font-bold py-3 rounded transition-colors">
            Pay ₹{{cartService.getCartTotal() + 150}}
          </button>
        </div>

        <div *ngIf="paymentMethod === 'upi'" class="max-w-sm text-center py-8">
          <svg class="w-16 h-16 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
          <h3 class="text-lg font-bold text-gray-700 mb-2">Pay using UPI App</h3>
          <p class="text-sm text-gray-500 mb-6">Open your UPI app on your phone and complete the payment.</p>
          <button (click)="processBooking()" class="w-full bg-[#00A5CF] hover:bg-[#008fb5] text-white font-bold py-3 rounded transition-colors">
            Pay ₹{{cartService.getCartTotal() + 150}}
          </button>
        </div>

        <div *ngIf="paymentMethod === 'netbanking'" class="max-w-sm text-center py-8">
          <p class="text-gray-500 mb-6">Select your bank from the list below and proceed to pay securely.</p>
          <select class="w-full border border-gray-300 rounded px-3 py-3 mb-6 focus:outline-none focus:border-[#00A5CF] text-gray-700 bg-white">
            <option>HDFC Bank</option>
            <option>SBI</option>
            <option>ICICI Bank</option>
            <option>Axis Bank</option>
            <option>Kotak Bank</option>
          </select>
          <button (click)="processBooking()" class="w-full bg-[#00A5CF] hover:bg-[#008fb5] text-white font-bold py-3 rounded transition-colors">
            Pay ₹{{cartService.getCartTotal() + 150}}
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
